    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 初始化捲動動畫
        function initAOS() {
            AOS.init({
                once: false,
                mirror: true
            });
        }

        // 核心動態載入：讀取 app.json
        async function loadProjects() {
            const container = document.getElementById('projects-container');
            try {
                // 讀取同目錄下的 app.json 檔案
                const response = await fetch('./app.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const projects = await response.json();
                
                let htmlContent = '';
                
                // 遍歷所有專案，動態生成 HTML
                projects.forEach((project, index) => {
                    const targetAttr = project.isExternal ? 'target="_blank"' : '';
                    const delay = (index + 1) * 100;
                    
                    htmlContent += `
                        <div class="matrix-border bg-black/40 rounded-2xl p-6 transition-all duration-300 flex flex-col justify-between" data-aos="fade-up" data-aos-delay="${delay}">
                            <div>
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-xs bg-[#00ff00]/10 text-[#00ff00] border border-[#00ff00]/30 px-2 py-1 rounded">${project.tag}</span>
                                    <span class="text-xs opacity-50">${project.version}</span>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-2 matrix-glow">
                                    ${project.title}
                                </h3>
                                <p class="text-[#00ff00]/80 text-sm leading-relaxed mb-6">
                                    ${project.description}
                                </p>
                            </div>
                            <a href="${project.url}" ${targetAttr} class="inline-flex items-center text-sm font-bold border-b border-transparent hover:border-[#00ff00] pb-1 w-fit transition-all">
                                EXECUTE_APP() <i class="fas fa-chevron-right ml-2 text-xs"></i>
                            </a>
                        </div>
                    `;
                });

                // 最後加上預留的 Coming Soon 卡片
                const comingSoonDelay = (projects.length + 1) * 100;
                htmlContent += `
                    <div class="border border-[#00ff00]/20 border-dashed rounded-2xl p-6 flex flex-col items-center justify-center text-center min-h-[220px]" data-aos="fade-up" data-aos-delay="${comingSoonDelay}">
                        <div class="w-10 h-10 rounded-full border border-[#00ff00]/30 flex items-center justify-center mb-3 opacity-60">
                            <i class="fas fa-plus text-sm animate-pulse"></i>
                        </div>
                        <h3 class="text-[#00ff00]/50 font-bold text-sm mb-1">Coming Soon</h3>
                        <p class="text-[#00ff00]/40 text-xs max-w-[220px]">核心引擎升級中，自動化模組與下一個開源腳本載入預留。</p>
                    </div>
                `;

                // 將內容塞入容器
                container.innerHTML = htmlContent;
                
                // 重新刷新 AOS 動畫，確保動態生成的卡片也有動畫特效
                initAOS();

            } catch (error) {
                console.error('Error fetching sitemap or projects:', error);
                container.innerHTML = `<div class="text-xs font-mono text-red-500">[ERROR]: FAILED_TO_LOAD_PROJECT_DATA</div>`;
                initAOS();
            }
        }

        // 網頁載入完成後執行
        window.addEventListener('DOMContentLoaded', loadProjects);
    </script>
