            background-color: rgba(255, 255, 255, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tech-border:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* 自訂暗色系滾動條 */

            width: 6px;
        }
        ::-webkit-scrollbar-track {

        }
        ::-webkit-scrollbar-thumb {

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function initAOS() {
            AOS.init({
                once: false,
                mirror: true
            });
        }

        async function loadProjects() {
            const container = document.getElementById('projects-container');
            try {
                const response = await fetch('./app.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const projects = await response.json();
                
                let htmlContent = '';
                
                projects.forEach((project, index) => {
                    const targetAttr = project.isExternal ? 'target="_blank"' : '';
                    const delay = (index + 1) * 100;
                    
                    htmlContent += `
                        <div class="tech-border rounded-2xl p-6 flex flex-col justify-between" data-aos="fade-up" data-aos-delay="${delay}">
                            <div>
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[11px] bg-neutral-800 text-neutral-300 border border-neutral-700 px-2 py-0.5 rounded font-mono font-medium">${project.tag}</span>
                                    <span class="text-xs text-neutral-500 font-mono">${project.version}</span>
                                </div>
                                <h3 class="text-lg font-bold text-white mb-2">
                                    ${project.title}
                                </h3>
                                <p class="text-neutral-400 text-sm leading-relaxed mb-6">
                                    ${project.description}
                                </p>
                            </div>
                            <a href="${project.url}" ${targetAttr} class="inline-flex items-center text-sm font-bold text-white border-b border-transparent hover:border-white pb-0.5 w-fit transition-all font-mono">
                                LAUNCH_APP <i class="fas fa-arrow-right ml-2 text-xs text-neutral-500"></i>
                            </a>
                        </div>
                    `;
                });

                const comingSoonDelay = (projects.length + 1) * 100;
                htmlContent += `
                    <div class="border border-white/10 border-dashed rounded-2xl p-6 flex flex-col items-center justify-center text-center min-h-[220px]" data-aos="fade-up" data-aos-delay="${comingSoonDelay}">
                        <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center mb-3 text-neutral-600">
                            <i class="fas fa-plus text-sm animate-pulse"></i>
                        </div>
                        <h3 class="text-neutral-500 font-bold text-sm mb-1 font-mono">Coming Soon</h3>
                        <p class="text-neutral-600 text-xs max-w-[220px]">新專案與自動化工具持續建構中。</p>
                    </div>
                `;

                container.innerHTML = htmlContent;
                initAOS();

            } catch (error) {
                console.error('Error fetching projects:', error);
                container.innerHTML = `<div class="text-xs font-mono text-red-400">[ERROR]: FAILED_TO_LOAD_PROJECT_DATA</div>`;
                initAOS();
            }
        }

        window.addEventListener('DOMContentLoaded', loadProjects);
    </script>
