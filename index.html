    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Fredoka One', 'Noto Sans TC', sans-serif;
            background-color: #fcfbfa; /* 溫柔的牛奶白底 */
            color: #5d534a; /* 溫暖的深可可色，比死黑更柔和 */
        }

        /* 大耳狗主題：粉嫩鵝黃與天空藍的可愛卡片 */
        .cute-card {
            background-color: #fef9e7; /* 軟綿綿淡黃色 */
            border: 2px solid #f9ebbe;
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cute-card:hover {
            transform: translateY(-6px);
            border-color: #bbdefb; /* 懸停時變成大耳狗天空藍 */
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(187, 222, 251, 0.4);
        }

        /* 軟綿綿雲朵漂浮動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* 自訂可愛滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fcfbfa;
        }
        ::-webkit-scrollbar-thumb {
            background: #f4e3b1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bbdefb;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-[#bbdefb] selection:text-[#5d534a]">

    <!-- 頂部可愛狀態欄：徹底拔除綠色與駭客代碼 -->
    <div class="w-full bg-[#fef9e7] border-b-2 border-[#f9ebbe] px-6 py-2.5 text-sm flex justify-between items-center text-[#7c6e62]">
        <div class="flex items-center gap-2">
            <span class="text-xs bg-[#e3f2fd] text-[#1e88e5] font-bold px-2.5 py-0.5 rounded-full animate-pulse">🐾 軟綿綿線上</span>
            <span class="hidden sm:inline opacity-60">|</span>
            <span class="hidden sm:inline font-medium">歡迎來到可愛小窩</span>
        </div>
        <div class="text-xs font-medium bg-white/80 px-2 py-0.5 rounded-full border border-[#f9ebbe]">
            (c9🩵•ω•)🩵
        </div>
    </div>

    <!-- 主要核心區塊 -->
    <main class="max-w-4xl mx-auto px-6 py-12 flex-grow w-full relative">
        
        <!-- 背景裝飾大耳狗可愛小雲朵 -->
        <div class="absolute top-10 left-4 text-3xl opacity-20 animate-float hidden md:block">☁️</div>
        <div class="absolute top-32 right-6 text-4xl opacity-20 animate-float hidden md:block" style="animation-delay: 1.5s;">☁️</div>

        <!-- 個人頭部區區 -->
        <section class="text-center mb-16 pt-6 relative">
            
            <!-- 大頭貼：圍繞大耳狗粉藍微光 -->
            <div class="inline-block p-1.5 rounded-full bg-white border-2 border-[#bbdefb] shadow-[0_8px_20px_rgba(187,222,251,0.3)] mb-6 relative" data-aos="zoom-in" data-aos-duration="1000">
                <img src="https://github.com/0xseanlee.png" alt="0xseanlee" class="w-24 h-24 rounded-full object-cover">
                <!-- 萌萌小腳印點綴 -->
                <span class="absolute -bottom-1 -right-1 text-xl">🐾</span>
            </div>
            
            <!-- 超可愛名字與大耳狗顏文字 -->
            <h1 class="text-4xl md:text-5xl font-bold tracking-wide text-[#5d534a] mb-2" data-aos="fade-down" data-aos-duration="800">
                0xseanlee <span class="text-2xl text-[#90caf9] block sm:inline-block sm:align-middle mt-2 sm:mt-0">(ु*´꒳`*)ु🩵</span>
            </h1>
            
            <p class="text-xs text-[#9c8e82] font-medium tracking-widest mb-6">~ Cinnamoroll & Creative Space ~</p>
            
            <!-- 柔和好看的信箱聯絡卡 -->
            <div class="inline-block" data-aos="fade-up" data-aos-delay="200">
                <a href="mailto:sean0970802201@gmail.com" class="text-sm bg-[#e3f2fd] text-[#1e88e5] font-medium px-5 py-2.5 rounded-full flex items-center gap-2 hover:bg-[#bbdefb] hover:text-[#0d47a1] transition-all duration-300 shadow-sm">
                    <i class="fas fa-envelope text-xs"></i>
                    <span>sean0970802201@gmail.com</span>
                </a>
            </div>
        </section>

        <!-- 我的社群 -->
        <section class="mb-16" data-aos="fade-up" data-aos-duration="800">
            <h2 class="text-lg font-bold mb-6 tracking-wide text-[#5d534a] flex items-center gap-2">
                <span>(́> 🩵 <)̀</span> 我的溫馨社群
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <a href="https://www.instagram.com/0xseanlee/" target="_blank" class="cute-card p-5 flex items-center justify-between group">
                    <div class="flex items-center space-x-3">
                        <i class="fab fa-instagram text-2xl text-[#e0a96d] group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-sm tracking-wide text-[#5d534a]">Instagram</span>
                    </div>
                    <i class="fas fa-heart text-xs text-[#f9ebbe] group-hover:text-[#ff8a80] transition-colors"></i>
                </a>
                <a href="https://www.youtube.com/@0xseanlee/" target="_blank" class="cute-card p-5 flex items-center justify-between group">
                    <div class="flex items-center space-x-3">

                        <span class="font-bold text-sm tracking-wide text-[#5d534a]">YouTube</span>
                    </div>

                </a>

                        <span class="font-bold text-sm tracking-wide text-[#5d534a]">Discord Server</span>
                    </div>
                    <i class="fas fa-heart text-xs text-[#f9ebbe] group-hover:text-[#ff8a80] transition-colors"></i>
                </a>
            </div>
        </section>

        <!-- 作品區塊（改為大耳狗萌化渲染） -->
        <section class="mb-12">
            <h2 class="text-lg font-bold mb-6 tracking-wide text-[#5d534a] flex items-center gap-2" data-aos="fade-right">
                <span>✨</span> 我的百寶袋作品
            </h2>
            
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 載入中動畫 -->
                <div class="text-sm font-medium text-[#9c8e82] py-4 flex items-center gap-2">

    </main>

    <!-- 頁尾：換成柔和粉嫩色系與可愛結束 -->

        <p>🐾 (c9•ω•)c9 2026 0xseanlee. 軟綿綿雲朵守護。ALL RIGHTS RESERVED. 🐾</p>
    </footer>

    <!-- 動畫庫與核心載入腳本 -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function initAOS() {
            AOS.init({
                once: false,
                mirror: true
            });
        }

        async function loadProjects() {
            const container = document.getElementById('projects-container');
            try {
                const response = await fetch('./app.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const projects = await response.json();
                
                let htmlContent = '';
                
                projects.forEach((project, index) => {
                    const targetAttr = project.isExternal ? 'target="_blank"' : '';
                    const delay = (index + 1) * 100;
                    
                    htmlContent += `
                        <div class="cute-card p-6 flex flex-col justify-between" data-aos="fade-up" data-aos-delay="${delay}">
                            <div>
                                <div class="flex justify-between items-center mb-4">
                                    <!-- 換成柔軟藍色調的小標籤 -->
                                    <span class="text-xs bg-[#e3f2fd] text-[#1e88e5] font-bold px-3 py-1 rounded-full">${project.tag}</span>
                                    <span class="text-xs text-[#9c8e82] font-bold opacity-70">⭐ ${project.version}</span>
                                </div>
                                <h3 class="text-xl font-bold text-[#5d534a] mb-2 flex items-center gap-1.5">
                                    ${project.title}
                                </h3>
                                <p class="text-[#7c6e62] text-sm leading-relaxed mb-6 font-normal">
                                    ${project.description}
                                </p>
                            </div>
                            <a href="${project.url}" ${targetAttr} class="inline-flex items-center text-sm font-bold text-[#1e88e5] hover:text-[#0d47a1] bg-white border border-[#bbdefb] hover:border-[#1e88e5] px-4 py-2 rounded-full w-fit transition-all shadow-sm">
                                點擊開啟 ✨ <i class="fas fa-chevron-right ml-1.5 text-xs"></i>
                            </a>
                        </div>
                    `;
                });

                const comingSoonDelay = (projects.length + 1) * 100;
                htmlContent += `
                    <div class="border-2 border-[#f9ebbe] border-dashed rounded-[24px] bg-white/40 p-6 flex flex-col items-center justify-center text-center min-h-[220px]" data-aos="fade-up" data-aos-delay="${comingSoonDelay}">
                        <div class="text-3xl animate-float mb-2" style="animation-duration: 3s;">☁️</div>
                        <h3 class="text-[#9c8e82] font-bold text-sm mb-1">Coming Soon</h3>
                        <p class="text-[#b2a496] text-xs max-w-[220px]">猴子正在努力打包新工具，敬請期待唷！</p>
                    </div>
                `;

                container.innerHTML = htmlContent;
                initAOS();

            } catch (error) {
                console.error('Error fetching projects:', error);
                container.innerHTML = `<div class="text-sm font-medium text-red-400">嗚嗚，雲朵迷路了，暫時抓不到作品資料 (ू˃̣̣̣̣̣̣︿˂̣̣̣̣̣̣ ू)</div>`;
                initAOS();
            }
        }

        window.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
